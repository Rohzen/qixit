<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Quixit — PixiJS</title>
    <style>
      html, body { margin:0; padding:0; background:#0b0f1a; height:100%; }
      #app { width:100vw; height:100vh; overflow:hidden; }
      .hud {
        position:absolute; top:10px; left:10px; color:#e0e6f0;
        font:14px system-ui, Segoe UI, Roboto, sans-serif;
        background:rgba(0,0,0,.35); padding:6px 10px; border-radius:10px; backdrop-filter: blur(3px);
      }
      .hint {
        position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
        color:#a9b6c8; font:13px system-ui, Segoe UI, Roboto, sans-serif;
        background:rgba(0,0,0,.25); padding:6px 10px; border-radius:10px;
      }
    </style>
    <!-- <script type="module" src="https://cdn.jsdelivr.net/npm/pixi.js@8.3.3/dist/pixi.min.mjs"></script> -->
    <script type="module" src="src/main.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div class="hud" id="hud">Area coperta: 0.0%</div>
    <div class="hint">WASD/Frecce per muovere; SPAZIO per disegnare; R per restart</div>
  </body>
</html>
